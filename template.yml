AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: RH AI API

Resources:
  MinhaApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: api/          
      Handler: app.main.handler     
      Runtime: python3.10        
      Architectures:
        - x86_64
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  ServerlessRestApi:
    Description: "URL do endpoint do API Gateway para o estagio Prod"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"